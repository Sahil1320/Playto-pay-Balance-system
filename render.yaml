# Render Blueprint — Deploy all services with one click
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: playto-pay-db
    plan: free
    databaseName: playto_pay
    user: playto

services:
  # --- Backend (Django API) ---
  - type: web
    name: playto-pay-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: POSTGRES_DB
        fromDatabase:
          name: playto-pay-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: playto-pay-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: playto-pay-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: playto-pay-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: playto-pay-db
          property: port
      - key: DATABASE_URL
        fromDatabase:
          name: playto-pay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-pay-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: playto-pay-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: playto-pay-redis
          type: redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # --- Celery Worker (Background Tasks) ---
  - type: worker
    name: playto-pay-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: "celery -A config worker -l info --concurrency=2 -B"
    envVars:
      - key: POSTGRES_DB
        fromDatabase:
          name: playto-pay-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: playto-pay-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: playto-pay-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: playto-pay-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: playto-pay-db
          property: port
      - key: REDIS_URL
        fromService:
          name: playto-pay-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: playto-pay-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: playto-pay-redis
          type: redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"

  # --- Frontend (React SPA — Static Site) ---
  - type: web
    name: playto-pay-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: VITE_API_URL
        value: https://playto-pay-backend.onrender.com

  # --- Redis ---
  - type: redis
    name: playto-pay-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
